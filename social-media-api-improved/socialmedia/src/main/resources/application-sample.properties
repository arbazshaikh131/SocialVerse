# ===================================
# SAMPLE CONFIGURATION — copy to application.properties and fill in values
# ===================================

# Database
DB_URL=jdbc:mysql://localhost:3306/socialmedia?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
DB_USERNAME=root
DB_PASSWORD=your_mysql_password

# JWT — must be at least 256 bits (32+ characters)
JWT_SECRET=replace-me-with-a-secure-random-string-min-32-chars
JWT_ACCESS_EXPIRES_MS=900000
JWT_REFRESH_EXPIRES_MS=604800000

# Server
SERVER_PORT=8080
