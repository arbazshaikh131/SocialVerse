version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: socialmedia-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: socialmedia
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: socialmedia-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/socialmedia?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-very-long-secure-secret-key-minimum-256-bits}
      JWT_ACCESS_EXPIRES_MS: ${JWT_ACCESS_EXPIRES_MS:-900000}
      JWT_REFRESH_EXPIRES_MS: ${JWT_REFRESH_EXPIRES_MS:-604800000}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
