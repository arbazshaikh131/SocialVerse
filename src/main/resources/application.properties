# ===================================
# Application
# ===================================
spring.application.name=social-media-api

# IMPORTANT: Render uses PORT, not SERVER_PORT
server.port=${PORT:8080}

# ===================================
# Database (Railway MySQL)
# ===================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / Hibernate
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# JWT Configuration
# ===================================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expires-ms=${JWT_ACCESS_EXPIRES_MS:900000}
app.jwt.refresh-token-expires-ms=${JWT_REFRESH_EXPIRES_MS:604800000}

# ===================================
# Swagger / OpenAPI
# ===================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
