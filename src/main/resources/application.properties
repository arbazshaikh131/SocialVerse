# ===================================
# Application
# ===================================
spring.application.name=social-media-api
server.port=${SERVER_PORT:8080}

# ===================================
# Database
# ===================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/socialmedia?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / Hibernate
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================
# JWT
# ===================================
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-secure-secret-key-minimum-256-bits}
app.jwt.access-token-expires-ms=${JWT_ACCESS_EXPIRES_MS:900000}
app.jwt.refresh-token-expires-ms=${JWT_REFRESH_EXPIRES_MS:604800000}

# ===================================
# OpenAPI / Swagger
# ===================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
